<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>Cadastro de Venda - ALESSANDRO</title>
    </head>
    <body class="bg-light">

        <div class="container mt-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="mb-0">Cadastro de Venda de Ingresso</h3>
                </div>
                <div class="card-body">
                    <form>
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="nome" class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label">E-mail</label>
                                <input type="email" class="form-control" id="email" placeholder="exemplo@email.com" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label for="corCamiseta" class="form-label">Cor da Camiseta (Brinde)</label>
                                <input type="color" class="form-control form-control-color w-100" id="corCamiseta" value="#000000" title="Escolha a cor">
                            </div>

                            <div class="col-md-8">
                                <label for="setor" class="form-label">Setor da Arquibancada</label>
                                <select class="form-select" id="setor" required>
                                    <option value="" selected disabled>Selecione o setor...</option>
                                    <option value="pista">Pista Premium</option>
                                    <option value="arquibancada-a">Arquibancada A</option>
                                    <option value="arquibancada-b">Arquibancada B</option>
                                    <option value="camarote">Camarote</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="fotoCracha" class="form-label">Foto para o Crachá</label>
                            <input class="form-control" type="file" id="fotoCracha">
                            <div class="form-text">Envie uma foto legível para a confecção do crachá.</div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success px-4">Salvar</button>
                            <button type="reset" class="btn btn-outline-secondary px-4">Limpar Formulário</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
